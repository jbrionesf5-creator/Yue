<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Recuerdos</title>

<style>
body {
  margin: 0;
  overflow: hidden;
  background: radial-gradient(circle at bottom, #050714, #000);
  font-family: Arial, sans-serif;
}

/* 🌌 fondo estrellas */
.star {
  position: absolute;
  width: 2px;
  height: 2px;
  background: white;
  border-radius: 50%;
  box-shadow: 0 0 6px white;
}

/* 🌠 estrellas fugaces */
.shooting-star {
  position: absolute;
  width: 120px;
  height: 2px;
  background: linear-gradient(90deg, white, transparent);
  transform: rotate(-45deg);
  animation: shoot 2s linear forwards;
}

@keyframes shoot {
  from { transform: translateX(0) translateY(0) rotate(-45deg); opacity: 1; }
  to { transform: translateX(500px) translateY(500px) rotate(-45deg); opacity: 0; }
}

/* 💖 corazones */
.heart {
  position: absolute;
  color: #ff4d88;
  font-size: 18px;
  text-shadow: 0 0 10px #ff4d88;
  animation: floatUp 6s linear forwards;
}

@keyframes floatUp {
  from { transform: translateY(100vh); opacity: 1; }
  to { transform: translateY(-10vh); opacity: 0; }
}

/* 📸 fotos estilo galaxia */
.photo {
  position: absolute;
  width: 110px;
  height: 110px;
  border-radius: 18px;
  overflow: hidden;
  cursor: pointer;
  box-shadow: 0 0 20px rgba(255,255,255,0.4);
  animation: float 6s ease-in-out infinite;
  z-index: 5;
  transition: transform 0.4s ease;
}

.photo img {
  width: 100%;
  height: 100%;
  object-fit: cover;
}

@keyframes float {
  0% { transform: translateY(0px); }
  50% { transform: translateY(-15px); }
  100% { transform: translateY(0px); }
}

/* 🌑 modo visualización */
#viewer {
  position: fixed;
  top: 0;
  left: 0;
  width: 100%;
  height: 100%;
  background: rgba(0,0,0,0.92);
  display: none;
  flex-direction: column;
  justify-content: center;
  align-items: center;
  z-index: 999;
}

/* 📸 imagen grande */
#viewer img {
  width: 320px;
  height: 320px;
  border-radius: 20px;
  box-shadow: 0 0 30px white;
  object-fit: cover;
}

/* 💬 frase */
#text {
  margin-top: 20px;
  color: white;
  font-size: 22px;
  text-align: center;
  max-width: 80%;
  text-shadow: 0 0 10px pink;
}
</style>
</head>

<body>

<div id="viewer">
  <img id="bigImg">
  <div id="text"></div>
</div>

<script>

/* 🌌 ESTRELLAS */
for (let i = 0; i < 140; i++) {
  let s = document.createElement("div");
  s.className = "star";
  s.style.left = Math.random() * window.innerWidth + "px";
  s.style.top = Math.random() * window.innerHeight + "px";
  document.body.appendChild(s);
}

/* 🌠 FUGACES */
setInterval(() => {
  let f = document.createElement("div");
  f.className = "shooting-star";
  f.style.left = Math.random() * window.innerWidth + "px";
  f.style.top = Math.random() * window.innerHeight / 2 + "px";
  document.body.appendChild(f);
  setTimeout(() => f.remove(), 2000);
}, 2500);

/* 💖 CORAZONES */
setInterval(() => {
  let h = document.createElement("div");
  h.className = "heart";
  h.innerHTML = "💖";
  h.style.left = Math.random() * window.innerWidth + "px";
  h.style.top = window.innerHeight + "px";
  document.body.appendChild(h);
  setTimeout(() => h.remove(), 6000);
}, 300);

/* 📸 IMÁGENES */
const photos = [
  "1.jpeg","2.jpeg","3.jpeg","4.jpeg","5.jpeg",
  "6.jpeg","7.jpeg","8.jpeg","9.jpeg","10.jpeg"
];

/* 💬 UNA FRASE POR FOTO */
const captions = [
  "Eres el regalo más grande de la vida.",
  "Cada día contigo es un recuerdo eterno.",
  "Tu sonrisa ilumina todo lo que tocas.",
  "Verte crecer es mi mayor orgullo.",
  "Eres amor en su forma más pura.",
  "Nada en el mundo se compara contigo.",
  "Eres mi razón, mi fuerza y mi alegría.",
  "Siempre serás mi tesoro más grande.",
  "El amor que siento por ti no tiene fin.",
  "Gracias por existir en mi vida."
];

/* 📸 CREAR FOTOS */
photos.forEach((src, i) => {

  let div = document.createElement("div");
  div.className = "photo";

  div.style.left = Math.random() * (window.innerWidth - 120) + "px";
  div.style.top = Math.random() * (window.innerHeight - 120) + "px";

  div.innerHTML = `<img src="${src}">`;

  div.addEventListener("click", () => {

    let viewer = document.getElementById("viewer");
    let img = document.getElementById("bigImg");
    let text = document.getElementById("text");

    viewer.style.display = "flex";
    img.src = src;

    // ⭐ frase individual por imagen
    text.innerText = captions[i];
  });

  document.body.appendChild(div);
});

/* cerrar al tocar fondo */
document.getElementById("viewer").addEventListener("click", () => {
  document.getElementById("viewer").style.display = "none";
});

</script>

</body>
</html>
